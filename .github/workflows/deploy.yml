name: Deploy — Contracts & Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment target'
        required: true
        default: 'testnet'
        type: choice
        options:
          - testnet
          - mainnet

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Build and hash WASM artifacts
  # ─────────────────────────────────────────────────────────────────────────────
  build-contracts:
    name: Build Contract WASMs
    runs-on: ubuntu-latest
    outputs:
      hello_world_hash: ${{ steps.hash.outputs.hello_world_hash }}
      escrow_hash:      ${{ steps.hash.outputs.escrow_hash }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contract/target
          key: cargo-${{ runner.os }}-${{ hashFiles('contract/Cargo.lock') }}

      - name: Build contracts
        working-directory: contract
        run: |
          cargo build --release --target wasm32v1-none -p hello-world
          cargo build --release --target wasm32v1-none -p escrow

      - name: Compute WASM checksums
        id: hash
        run: |
          HELLO_HASH=$(sha256sum contract/target/wasm32v1-none/release/hello_world.wasm | cut -d' ' -f1)
          ESCROW_HASH=$(sha256sum contract/target/wasm32v1-none/release/escrow.wasm | cut -d' ' -f1)
          echo "hello_world_hash=$HELLO_HASH" >> $GITHUB_OUTPUT
          echo "escrow_hash=$ESCROW_HASH" >> $GITHUB_OUTPUT
          echo "### WASM Checksums" >> $GITHUB_STEP_SUMMARY
          echo "| Contract | SHA-256 |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| hello-world | \`$HELLO_HASH\` |" >> $GITHUB_STEP_SUMMARY
          echo "| escrow | \`$ESCROW_HASH\` |" >> $GITHUB_STEP_SUMMARY

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contract-wasms-${{ github.sha }}
          path: |
            contract/target/wasm32v1-none/release/hello_world.wasm
            contract/target/wasm32v1-none/release/escrow.wasm

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Build frontend
  # ─────────────────────────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: dist/

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Deploy frontend to GitHub Pages
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [build-frontend]
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: dist/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: Create GitHub Release with WASM artifacts
  # ─────────────────────────────────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-contracts, build-frontend]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: contract-wasms-${{ github.sha }}
          path: wasm/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: wasm/*.wasm
          body: |
            ## ASTRA Release ${{ github.ref_name }}

            ### Contract WASM Checksums
            | Contract | SHA-256 |
            |---|---|
            | hello-world | `${{ needs.build-contracts.outputs.hello_world_hash }}` |
            | escrow | `${{ needs.build-contracts.outputs.escrow_hash }}` |

            ### Deployment
            See [DEPLOYMENT.md](./DEPLOYMENT.md) for instructions.
